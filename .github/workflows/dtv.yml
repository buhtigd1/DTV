name: Update Playlist and EPG

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Prepare Git and Pull
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Pull before running the scraper to ensure a clean slate for rebase
          git pull origin main --rebase

      - name: Run Scraper
        run: python scraper.py

      - name: Deploy to Repo
        run: |
          git add dtv.m3u epg.xml channels.json
          
          # Use --allow-empty so the workflow doesn't fail if no new channels were found
          git commit --allow-empty -m "Update $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push --force origin main
